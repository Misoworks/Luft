[workspace]
members = [
    "crates/baton",
    "crates/staccato-config",
    "crates/staccato-ipc",
    "crates/staccato-layout",
    "crates/staccato-session",
    "crates/staccato-shell",
    "crates/staccatoctl",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
smithay = { version = "0.7.0", default-features = false, features = ["backend_winit", "desktop", "wayland_frontend"] }
thiserror = "2.0.18"
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

staccato-config = { path = "crates/staccato-config" }
staccato-ipc = { path = "crates/staccato-ipc" }
staccato-layout = { path = "crates/staccato-layout" }
staccato-session = { path = "crates/staccato-session" }

[profile.dev.package."baton"]
opt-level = 2

[profile.dev.package."staccato-shell"]
opt-level = 2

[profile.dev.package."smithay"]
opt-level = 2
