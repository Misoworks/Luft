<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Session</title>
    <style>
      :root {
        color: rgba(248, 248, 246, 0.96);
        font-family: Geist, "Adwaita Sans", Cantarell, ui-sans-serif, system-ui, sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }
      * {
        box-sizing: border-box;
        user-select: none;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }
      .session-actions {
        display: grid;
        gap: 4px;
        width: 100%;
        height: 100%;
        padding: 6px;
        border-radius: 18px;
        background: linear-gradient(rgba(20, 20, 18, 0.64), rgba(20, 20, 18, 0.64)),
          rgba(24, 23, 20, 0.34);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.11), inset 0 0 0 1px rgba(255, 255, 255, 0.055);
      }
      .session-action {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 36px;
        padding: 0 10px 0 6px;
        border: 0;
        border-radius: 12px;
        color: inherit;
        background: rgba(255, 255, 255, 0.075);
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .session-action:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .session-action:active {
        transform: scale(0.97);
      }
      .session-action.is-danger {
        color: rgba(255, 170, 160, 0.98);
      }
      .session-action-icon {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.08);
      }
      .session-action svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <main class="session-actions">
      <button type="button" class="session-action" data-command="lock">
        <span class="session-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </span>
        <span>Lock</span>
      </button>
      <button type="button" class="session-action" data-command="suspend">
        <span class="session-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M20 14.6A8 8 0 0 1 9.4 4 7 7 0 1 0 20 14.6Z"/></svg>
        </span>
        <span>Suspend</span>
      </button>
      <button type="button" class="session-action" data-command="reboot">
        <span class="session-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        </span>
        <span>Restart</span>
      </button>
      <button type="button" class="session-action is-danger" data-command="power-off">
        <span class="session-action-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg>
        </span>
        <span>Power Off</span>
      </button>
    </main>
    <script>
      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-command]");
        if (!button || !window.fenestra?.bridge) return;
        await window.fenestra.bridge.invoke("luft.action", {
          type: "session-command",
          command: button.dataset.command,
        });
        window.fenestra.popup?.close?.();
      });
    </script>
  </body>
</html>
