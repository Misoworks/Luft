[general]
default_profile = "panel-default"
enable_effects = true
enable_blur = true
enable_animations = true

[compositor]
backend = "auto"
xwayland = true
debug_overlay = false

[display]
default_scale = 1.0

[session]
lock_command = "if command -v asher-lock >/dev/null 2>&1; then exec asher-lock; elif command -v gtklock >/dev/null 2>&1; then exec gtklock; elif command -v swaylock >/dev/null 2>&1; then exec swaylock; elif command -v waylock >/dev/null 2>&1; then exec waylock; else exec loginctl lock-session; fi"
suspend_command = "systemctl suspend"
reboot_command = "systemctl reboot"
poweroff_command = "systemctl poweroff"

[appearance]
animations = true
panel_icon_size = 40
panel_magnification = false
panel_launcher = true

[effects]
background_effect_protocol = true
blur = true
blur_quality = "balanced"

[workspaces]
count = 1
restore_sessions = true

[default_apps]
terminal = "ghostty"
file_manager = "nautilus"
browser = "google-chrome-stable"
settings = ""
launcher = "vicinae"

[panel]
customized = false
